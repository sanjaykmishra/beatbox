# Local stack for Beat. Builds the same Dockerfiles used by Fly.io.
#
#   docker compose up --build      # build + start everything
#   docker compose logs -f api     # follow api logs
#   docker compose down            # stop + remove containers
#   docker compose down -v         # also remove the postgres volume (drops data)
#
# Defaults are dev-friendly: weak passwords, R2 left blank (logo upload returns
# 503 until you set R2_* env vars). Anthropic, Stripe, ScrapingBee, etc. are
# wired through env passthrough — set them in a .env file at the repo root if
# you want to exercise those code paths.

name: beat

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beat
      POSTGRES_USER: beat
      POSTGRES_PASSWORD: beat
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beat -d beat"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/beat
      DATABASE_USERNAME: beat
      DATABASE_PASSWORD: beat
      API_PORT: "8080"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL_EXTRACTION: ${ANTHROPIC_MODEL_EXTRACTION:-claude-sonnet-4}
      ANTHROPIC_MODEL_SUMMARY: ${ANTHROPIC_MODEL_SUMMARY:-claude-opus}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      SCRAPINGBEE_API_KEY: ${SCRAPINGBEE_API_KEY:-}
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN:-}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RENDER_SERVICE_URL: http://render:3000
      RENDER_SERVICE_TOKEN: ${RENDER_SERVICE_TOKEN:-dev-shared-secret}
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOGTAIL_TOKEN: ${LOGTAIL_TOKEN:-}
      APP_BASE_URL: http://localhost:5173
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  render:
    build:
      context: .
      dockerfile: infra/render/Dockerfile
    environment:
      RENDER_PORT: "3000"
      RENDER_SERVICE_TOKEN: ${RENDER_SERVICE_TOKEN:-dev-shared-secret}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: infra/web/Dockerfile
    ports:
      - "5173:8080"
    volumes:
      # Override the production nginx config with one that proxies /v1 to api.
      - ./infra/web/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:

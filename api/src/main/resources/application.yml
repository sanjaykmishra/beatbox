spring:
  application:
    name: beat-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beat}
    username: ${DATABASE_USERNAME:beat}
    password: ${DATABASE_PASSWORD:beat}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

beat:
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-base-url: ${R2_PUBLIC_BASE_URL:}
  screenshots:
    # Local-disk fallback for screenshots when R2 isn't configured (typical local Docker dev).
    # Set this to a writable directory (mount as a volume in compose). When empty, screenshots
    # are simply skipped, which is fine for production where R2 above is configured.
    local-dir: ${LOCAL_SCREENSHOTS_DIR:}
  pdfs:
    # Local-disk fallback for generated PDFs when R2 isn't configured. Same shape as the
    # screenshots fallback above. When empty AND R2 is empty, report generation fails with
    # object_storage_not_configured.
    local-dir: ${LOCAL_PDFS_DIR:}
  render:
    # Base URL the render container uses to resolve relative resource URLs in the rendered HTML
    # (the /v1/screenshots/... shape that comes out of LocalScreenshotStore). In Docker compose
    # this is the api service's internal hostname. Production R2 URLs are absolute, so this can
    # be empty there.
    internal-api-url: ${RENDER_INTERNAL_API_URL:}
  prompts:
    extraction:
      # Tier dispatch for the article extraction pipeline (see ExtractionService.java).
      #   two_tier — use TwoTierExtractionService → extraction-v1-3 (Haiku → Sonnet escalation,
      #              cost-engineered, supports the 'missing' subject_prominence value).
      #              This is the production path.
      #   single   — legacy single-call path using extraction-v1 / extraction-v1-1. Falls back
      #              for emergency rollback only; does NOT support 'missing'.
      #   shadow   — single user-facing + two_tier telemetry-only.
      tier: ${BEAT_PROMPTS_EXTRACTION_TIER:two_tier}
      version: ${BEAT_PROMPTS_EXTRACTION_VERSION:v1_3}
    summary:
      # v1 (Opus, original) | v1_1 (Sonnet, cached) | v1_2 (grounding rules) | shadow | shadow_v12
      version: ${BEAT_PROMPTS_SUMMARY_VERSION:v1}
    social-extraction:
      # v1_0 (legacy 3-value enum) | v1_1 (adds 'missing'). Default v1_1.
      version: ${BEAT_PROMPTS_SOCIAL_EXTRACTION_VERSION:v1_1}
    post-variant:
      # v1_0 (no caching) | v1_1 (cost-engineered: brand-voice + instructions cached per
      # docs/18-cost-engineering.md §"Social post-variant generation"). Default v1_1.
      version: ${BEAT_PROMPTS_POST_VARIANT_VERSION:v1_1}
  admin:
    # Comma-separated list of user emails allowed to view /v1/admin/*. Empty = nobody.
    emails: ${ADMIN_EMAILS:}
  social:
    # Phase 1.5 (docs/17-phase-1-5-social.md). Empty values disable the corresponding
    # fetcher; the social pipeline falls back to a manual-entry stub. No-ops in dev.
    scrapingbee:
      api-key: ${SCRAPINGBEE_API_KEY:}
    # Reddit's public JSON API requires a descriptive User-Agent per their terms.
    reddit:
      user-agent: ${REDDIT_USER_AGENT:beat-app/0.1 (+https://beat.app/contact)}
    # Bluesky AT Protocol is keyless for read-only public-post fetches.

logging:
  level:
    root: INFO
    app.beat: INFO

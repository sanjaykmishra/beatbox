spring:
  application:
    name: beat-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beat}
    username: ${DATABASE_USERNAME:beat}
    password: ${DATABASE_PASSWORD:beat}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    app.beat: INFO

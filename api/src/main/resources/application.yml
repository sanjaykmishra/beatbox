spring:
  application:
    name: beat-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beat}
    username: ${DATABASE_USERNAME:beat}
    password: ${DATABASE_PASSWORD:beat}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

beat:
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-base-url: ${R2_PUBLIC_BASE_URL:}

logging:
  level:
    root: INFO
    app.beat: INFO

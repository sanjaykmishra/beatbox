spring:
  application:
    name: beat-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beat}
    username: ${DATABASE_USERNAME:beat}
    password: ${DATABASE_PASSWORD:beat}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${API_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

beat:
  r2:
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-base-url: ${R2_PUBLIC_BASE_URL:}
  screenshots:
    # Local-disk fallback for screenshots when R2 isn't configured (typical local Docker dev).
    # Set this to a writable directory (mount as a volume in compose). When empty, screenshots
    # are simply skipped, which is fine for production where R2 above is configured.
    local-dir: ${LOCAL_SCREENSHOTS_DIR:}
  admin:
    # Comma-separated list of user emails allowed to view /v1/admin/*. Empty = nobody.
    emails: ${ADMIN_EMAILS:}
  social:
    # Phase 1.5 (docs/17-phase-1-5-social.md). Empty values disable the corresponding
    # fetcher; the social pipeline falls back to a manual-entry stub. No-ops in dev.
    scrapingbee:
      api-key: ${SCRAPINGBEE_API_KEY:}
    # Reddit's public JSON API requires a descriptive User-Agent per their terms.
    reddit:
      user-agent: ${REDDIT_USER_AGENT:beat-app/0.1 (+https://beat.app/contact)}
    # Bluesky AT Protocol is keyless for read-only public-post fetches.

logging:
  level:
    root: INFO
    app.beat: INFO

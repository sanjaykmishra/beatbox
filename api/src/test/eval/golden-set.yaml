  subject_name: Acme Corp
  expected:
    sentiment: neutral
    subject_prominence: passing
    topics_must_include_any_of: [ai, market]

- id: trade_pub_partnership
  source_file: articles/trade_pub_partnership.txt
  category: trade_publication
  url: https://www.example-trade.com/2025/11/05/acme-foo-corp
  outlet_name: ExampleTrade
  subject_name: Acme Corp
  expected:

app = "beat-render"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RENDER_PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks.http]]
      method = "GET"
      path = "/healthz"
      interval = "15s"
      timeout = "2s"
      grace_period = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "4gb"

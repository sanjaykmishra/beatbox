server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the api service on the docker network.
  # In production, web and api are separate Fly apps and use their own hosts;
  # this proxy block is only used by docker-compose (mounted at runtime).
  location /v1/ {
    proxy_pass         http://api:8080/v1/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location / {
    try_files $uri /index.html;
  }

  location ~* \.(?:js|css|svg|woff2?|png|jpg|jpeg|gif)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
